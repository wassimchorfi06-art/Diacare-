name: Build DiaCare APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy www files into Android assets
        run: |
          cp -r diacare-android/www/. diacare-android/android-project/app/src/main/assets/www/

      - name: Make gradlew executable
        run: chmod +x diacare-android/android-project/gradlew

      - name: Build Debug APK
        run: |
          cd diacare-android/android-project
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DiaCare-APK
          path: diacare-android/android-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
